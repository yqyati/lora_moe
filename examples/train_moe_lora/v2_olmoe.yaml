### model
model_name_or_path: allenai/OLMoE-1B-7B-0924
trust_remote_code: true
use_reentrant_gc: false   # reentrant GC + DDP(find_unused_parameters=true) 会让同一参数被 mark ready 两次

### method (V2: 全局共享池 512 + W_l 每层独立 — 主推荐)
stage: sft
do_train: true
finetuning_type: moe_lora
moe_lora_n_experts: 128
moe_lora_rank: 16
moe_lora_alpha: 2
moe_lora_pool_share: global
moe_lora_w_share: per_layer
moe_lora_target_layers: all

### dataset
dataset: metamathqa_r1
template: default
cutoff_len: 2048
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/olmoe/moe_lora/v2_global_unlinear
logging_steps: 5
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb
run_name: v2_global_pool512

### train
per_device_train_batch_size: 32
gradient_accumulation_steps: 2
learning_rate: 4.0e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_find_unused_parameters: true   # top-k 路由会跳过未选中的 expert，DDP 默认会因为这些 unused param 报错
